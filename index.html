<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>TuneBox</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="topo">
        <h1> TuneBox </h1>

        <a href="#audios">Áudios</a>
        <a href="#videos">Vídeos</a>
    </div>

    <div class="banner">
        <h2>Músicas gratuitas</h2>
    </div>

    <div class="container">

        <h2 id="audios"> Áudios</h2>

        <div class="card">

            <img src="Lima/Imagens/Set dos casados.jpg" width="250">

            <h3>Set dos Casados</h3>


            <audio controls autoplay>
                <source src="Lima/Audio/Set dos Casados - MC Kevin, Davi, Hariel, Don Juan, Kapela, Marks, G15, Ryan SP, Gaab (GR6 Explode) - GR6 EXPLODE (youtube).mp3" type="audio/mp3">
            </audio>

        </div>

        <div class="card">

            <img src="Lima/Imagens/Nosso lugar.jpg" width="250">

            <h3>Nosso Lugar</h3>

            <audio controls loop>
                <source src="Lima/Audio/MC Kevin e Thiago Castanho - Nosso Lugar (GR6 Filmes) - GR6 EXPLODE (youtube).mp3" type="audio/mp3">
            </audio>

        </div>

        <div class="card">

            <img src="Lima/Imagens/Kenny G.jpg" width="250">

            <h3>Kenny G</h3>


            <audio controls>
                <source src="Lima/Audio/Matuê - Kenny G - 30PRAUM (youtube).mp3" type="audio/mp3">
            </audio>

        </div>

        <h2 id="videos">Vídeos</h2>

        <div class="card">

            <h3>Vídeo 1</h3>

            

            <video controls poster="Lima/Imagens/Set dos casados.jpg" width="300">
                <source src="Lima/Vídeos/Set dos Casados - MC Kevin, Davi, Hariel, Don Juan, Kapela, Marks, G15, Ryan SP, Gaab (GR6 Explode) - GR6 EXPLODE (480p, h264, youtube).mp4" type="video/mp4">
            </video>

        </div>

        <div class="card">

            <h3>Vídeo 2</h3>

            

            <video controls poster="Lima/Imagens/Nosso lugar.jpg" width="300">
                <source src="Lima/Vídeos/MC Kevin e Thiago Castanho - Nosso Lugar (GR6 Filmes) - GR6 EXPLODE (720p, h264, youtube).mp4" type="video/mp4">
            </video>

        </div>

        <div class="card">

            <h3>Vídeo 3</h3>

            

            <video controls poster="Lima/Imagens/Kenny G.jpg" width="300">
                <source src="Lima/Vídeos/Matuê - Kenny G - 30PRAUM (720p, h264, youtube).mp4" type="video/mp4">
            </video>

        </div>

    </div>

    <div class="rodape">
        Feito por Eduardo
    </div>

</body>

</html>
